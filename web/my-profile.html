<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的主页 - Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Geist+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="/lib/phosphor-icons/index.js"></script>
<script src="/js/theme.js"></script>
<link rel="stylesheet" href="/css/page-common.css">
<link rel="stylesheet" href="/css/my-profile.css">
</head>
<body>
<div class="page-shell">
<header class="topbar">
  <a href="/" class="site-brand">Journal</a>
  <nav class="topnav">
    <a href="/">首页</a>
    <a href="/following">关注</a>
    <a href="/notifications">消息</a>
    <a href="/editor" class="btn primary"><i class="ph ph-pencil-simple"></i><span>写文章</span></a>
  </nav>
</header>

<main class="profile-page">
  <div id="status" class="status-line">正在加载我的主页...</div>

  <section class="profile-hero" id="profile-hero" hidden>
    <div class="profile-avatar-wrap">
      <img class="profile-avatar" id="profile-avatar" src="" alt="">
      <button class="avatar-edit-btn" id="avatar-edit-btn" type="button" title="更换头像"><i class="ph ph-camera"></i></button>
      <input type="file" id="avatar-input" accept="image/jpeg,image/png,image/webp" hidden>
    </div>
    <div class="profile-copy">
      <p class="label">profile</p>
      <h1 id="profile-name">我的主页</h1>
      <p id="profile-bio" class="profile-bio"></p>
      <div class="profile-actions">
        <a class="btn primary" href="/editor"><i class="ph ph-pencil-simple"></i>写文章</a>
        <a class="btn" href="/following"><i class="ph ph-users-three"></i>关注列表</a>
        <button class="btn" id="edit-profile-btn" type="button"><i class="ph ph-user-circle-gear"></i>编辑信息</button>
      </div>
    </div>
  </section>

  <section class="profile-edit-panel panel" id="profile-edit-panel" hidden>
    <div class="panel-head">
      <h2 class="section-title">编辑个人信息</h2>
      <button class="icon-btn" id="cancel-edit" type="button" title="取消"><i class="ph ph-x"></i></button>
    </div>
    <form class="form-grid" id="profile-edit-form">
      <label class="field">
        <span>用户名</span>
        <input class="input" id="edit-username" type="text" minlength="3" maxlength="50" required>
      </label>
      <label class="field">
        <span>简介</span>
        <textarea class="textarea" id="edit-bio" maxlength="500" placeholder="介绍一下你自己..."></textarea>
      </label>
      <div class="edit-error" id="edit-error"></div>
      <div class="actions">
        <button class="btn primary" type="submit"><i class="ph ph-check"></i>保存</button>
        <button class="btn" type="button" id="cancel-edit-btn">取消</button>
      </div>
    </form>
  </section>

  <section class="stat-grid" id="stat-grid" hidden>
    <div class="stat-card"><span id="article-count">0</span><p>文章</p></div>
    <div class="stat-card"><span id="follower-count">0</span><p>粉丝</p></div>
    <div class="stat-card"><span id="following-count">0</span><p>关注</p></div>
  </section>

  <section class="profile-layout" id="profile-content" hidden>
    <div class="panel">
      <div class="panel-head">
        <h2 class="section-title">我的文章</h2>
        <a href="/editor" class="tiny">新建文章</a>
      </div>
      <div id="my-articles" class="profile-list"></div>
    </div>
    <aside class="panel">
      <div class="panel-head">
        <h2 class="section-title">我的收藏</h2>
      </div>
      <div id="my-favorites" class="profile-list compact"></div>
    </aside>
  </section>
</main>
</div>

<script src="/js/my-profile.js"></script>
</body>
</html>
