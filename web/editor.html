<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写文章 - Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Geist+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="/lib/phosphor-icons/index.js"></script>
<link rel="stylesheet" href="/css/editor.css">
</head>
<body>
<header class="top-bar">
  <a href="/" class="back-link"><i class="ph ph-arrow-left"></i>返回首页</a>
  <a href="/" class="site-brand">Journal</a>
  <div class="editor-actions">
    <button class="btn btn-secondary" id="btn-preview" type="button"><i class="ph ph-eye"></i>预览</button>
    <button class="btn btn-primary" id="btn-save" type="button"><i class="ph ph-floppy-disk"></i>保存</button>
  </div>
</header>
<main class="container">
  <div id="editor-content" hidden>
    <form id="article-form">
      <div class="form-group">
        <label class="form-label">标题</label>
        <input type="text" class="form-input title-input" id="title" placeholder="文章标题..." required>
      </div>
      <div class="form-group">
        <label class="form-label">内容 Markdown</label>
        <textarea class="form-textarea" id="content" placeholder="在此书写 Markdown 内容..." required></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">专题</label>
        <select class="form-select" id="category"><option value="">无专题</option></select>
      </div>
      <div class="form-group">
        <label class="form-label">标签</label>
        <div class="tag-chips" id="tag-chips"></div>
      </div>
      <div class="form-group">
        <label class="form-label">封面图</label>
        <input type="text" class="form-input" id="cover-image" placeholder="封面图 URL（可选）">
        <img src="" id="cover-preview" class="cover-preview" alt="">
        <div class="upload-hint">
          <button class="btn btn-secondary" type="button" id="btn-upload"><i class="ph ph-image"></i>上传图片</button>
          <input type="file" class="upload-input" id="file-input" accept="image/*">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">状态</label>
        <div class="status-options">
          <button type="button" class="status-option selected" data-status="draft">草稿</button>
          <button type="button" class="status-option" data-status="published">发布</button>
          <button type="button" class="status-option" data-status="archived">归档</button>
        </div>
      </div>
    </form>
  </div>
  <div class="status-line visible" id="status-line">正在加载编辑器...</div>
</main>
<div class="toast" id="toast"></div>
<script src="/js/editor.js"></script>
</body>
</html>
